name: Decoupled LLM Gateway

on:
  push:
    paths:
      - "Decoupled-LLM-Gateway/**"
      - ".github/workflows/decoupled-llm-gateway.yml"
  pull_request:
    paths:
      - "Decoupled-LLM-Gateway/**"
      - ".github/workflows/decoupled-llm-gateway.yml"

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Decoupled-LLM-Gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Test
        run: go test ./... -race -count=1
      - name: Vet
        run: go vet ./...
      - name: Worker dependencies
        run: pip install -r worker/requirements.txt
        working-directory: Decoupled-LLM-Gateway
      - name: Worker CLI
        run: python3 worker/main.py --help
        working-directory: Decoupled-LLM-Gateway
      - name: Paper benchmark self-check
        run: python3 experiments/run_paper_benchmark.py --self-check
        working-directory: Decoupled-LLM-Gateway
      - name: Output guard smoke (echo + judge + gateway)
        run: make smoke-output-guard
        working-directory: Decoupled-LLM-Gateway

  worker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Worker stdin smoke
        run: |
          echo '{"trace_id":"t1","timestamp":0,"injected_decoy_id":"","raw_user_prompt":"","obfuscated_prompt":"","llm_response":"","degradation_triggered":false}' | python3 Decoupled-LLM-Gateway/worker/main.py
